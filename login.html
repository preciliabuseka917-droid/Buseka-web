<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Connexion</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: navy blue;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .login-container {
                background: black;
                padding: 70px;
                border-radius: 10px;
                box-shadow: 0px, 5px, 15px rgb(0, 0, 0, 0.2);
                width: 300px;
                text-align: center;
            }
            h2 {
                color: #eddede;
                margin-bottom: 20px;
            }
            input {
                width: 100px;
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #ccc;
                border-radius: 5px;
            }
            input:focus {
                border-color: #4facfe;
                outline: none;
            }
            button {
                width: 100%;
                padding: 10px;
                background: #4facfe;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
            } 
            button:hover {
                background: #00c6ff;
            }
            .footer  {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            }
            .footer a {
                color: #4facfe;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            <h2>Connexion</h2>
            <form>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Mot de passe" required>
                <button type="submit">se connecter</button>
            </form>
            <div class="footer">
                Pas de compte ? <a href="#">Inscrivez-vous</a>
            </div>
        </div>    
    </body>
</html>
